name: Android CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        env:
          TASKSHELL_KEYSTORE_BASE64: ${{ secrets.TASKSHELL_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$TASKSHELL_KEYSTORE_BASE64" ]; then
            echo "TASKSHELL_KEYSTORE_BASE64 is required for signed release builds." >&2
            exit 1
          fi
          mkdir -p keystore
          printf '%s' "$TASKSHELL_KEYSTORE_BASE64" | base64 --decode > keystore/taskshell-release.jks
          chmod 600 keystore/taskshell-release.jks

      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Build signed release APK
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        env:
          TASKSHELL_KEYSTORE: keystore/taskshell-release.jks
          TASKSHELL_KEY_ALIAS: ${{ secrets.TASKSHELL_KEY_ALIAS }}
          TASKSHELL_STORE_PASSWORD: ${{ secrets.TASKSHELL_STORE_PASSWORD }}
          TASKSHELL_KEY_PASSWORD: ${{ secrets.TASKSHELL_KEY_PASSWORD }}
        run: |
          : "${TASKSHELL_KEY_ALIAS:?TASKSHELL_KEY_ALIAS is required}"
          : "${TASKSHELL_STORE_PASSWORD:?TASKSHELL_STORE_PASSWORD is required}"
          : "${TASKSHELL_KEY_PASSWORD:?TASKSHELL_KEY_PASSWORD is required}"
          ./gradlew --no-daemon assembleRelease

      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: taskshell-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: taskshell-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
